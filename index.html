<!DOCTYPE html>
<html>
<head>
  <title>AI Creator</title>
  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      text-align: center;
      padding: 50px;
    }

    input {
      width: 60%;
      padding: 12px;
      border-radius: 8px;
      border: none;
    }

    button {
      padding: 12px;
      border-radius: 8px;
      border: none;
      background: green;
      color: white;
      margin-left: 10px;
    }

    #output {
      margin-top: 20px;
      white-space: pre-line;
    }
  </style>
</head>

<body>

<h1>🤖 Free AI Video Creator</h1>

<input id="prompt" placeholder="Describe your video..." />
<button onclick="generate()">Generate</button>

<div id="output"></div>

<script>
function generate() {
  const p = document.getElementById("prompt").value;

  const improved =
    "Create a cinematic animated video: " + p +
    ". High quality, smooth motion, detailed lighting, realistic style, 4k.";

  document.getElementById("output").innerText =
    "🎬 Use this prompt in Pika Labs:\n\n" + improved +
    "\n\n👉 Opening tool...";

  window.open("https://pika.art", "_blank");
}
</script>

</body>
</html>
